<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Agri Economics Practice</title>
  
  <link rel="stylesheet" href="style.css?v=2">

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 20px;
      background: #f4f8f3;
      color: #222;
    }

    .page {
      max-width: 800px;
      margin: auto;
    }

    h1 {
      margin-bottom: 10px;
      color: #2e7d32;
    }

    /* BACK BUTTON */
    .back-btn {
      display: inline-block;
      margin: 15px 0 20px;
      padding: 10px 18px;
      background: #2e7d32;
      color: #ffffff;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
    }

    .back-btn:hover {
      background: #1b5e20;
    }

    #score {
      font-size: 20px;
      font-weight: bold;
      margin: 15px 0;
    }

    .question-box {
      background: white;
      padding: 20px;
      margin: 20px auto;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      text-align: left;
    }

    #question {
      font-size: 22px;
      margin-bottom: 10px;
    }

    li {
      list-style: none;
      padding: 12px;
      margin: 8px 0;
      border-radius: 8px;
      background: #ececec;
      cursor: pointer;
    }

    li:hover {
      background: #dcedc8;
    }

    .correct {
      background: #a5d6a7 !important;
      font-weight: bold;
    }

    .wrong {
      background: #ffcdd2 !important;
      font-weight: bold;
    }

    #nextBtn, #restartBtn {
      padding: 12px 20px;
      margin-top: 15px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    #nextBtn {
      background: #2e7d32;
      color: white;
    }

    #nextBtn:hover {
      background: #1b5e20;
    }

    #restartBtn {
      display: none;
      background: #1565c0;
      color: white;
    }

    #final {
      margin-top: 20px;
      font-size: 22px;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div class="page">

    <h1>💼 Agri Economics Practice</h1>

    <a href="practice.html" class="back-btn">⬅ Back to Subjects</a>

    <p id="score">Score: 0</p>

    <div class="question-box">
      <h3 id="question"></h3>
      <ul id="choices"></ul>
    </div>

   <button id="nextBtn" onclick="nextQuestion()">Next ➡</button>
<button id="restartBtn" onclick="restartQuiz()">Restart 🔁</button>

<!-- DITO -->
<div style="text-align:center; margin-top:20px;">
  <a href="practice.html"
     style="display:inline-block; padding:10px 18px; background:#2e7d32; color:#ffffff; border-radius:8px; text-decoration:none; font-weight:bold;">
     ⬅ Back to Subjects
  </a>
</div>

<h2 id="final"></h2>

  </div>

  <script>
    const quiz = [
      { q: "1. What is the law of demand?",
        choices: ["As price increases, quantity demanded increases","As price increases, quantity demanded decreases","Demand stays the same regardless of price","Supply determines demand"],
        answer: 1 },

      { q: "2. What is the law of supply?",
        choices: ["As price increases, quantity supplied increases","As price increases, quantity supplied decreases","Supply stays the same regardless of price","Demand determines supply"],
        answer: 0 },

      { q: "3. What is the meeting point of supply and demand called?",
        choices: ["Break-even point","Equilibrium","Surplus","Deficit"],
        answer: 1 },

      { q: "4. Which is considered a fixed cost in farming?",
        choices: ["Seeds","Fertilizer","Land rent","Fuel"],
        answer: 2 },

      { q: "5. Which is considered a variable cost?",
        choices: ["Land tax","Depreciation","Seeds","Interest on capital"],
        answer: 2 },

      { q: "6. What is profit?",
        choices: ["Total cost minus total revenue","Total revenue minus total cost","Fixed cost plus variable cost","Gross income only"],
        answer: 1 },

      { q: "7. What does marketing primarily involve?",
        choices: ["Only selling products","Producing farm goods only","Moving goods from producer to consumer","Storing goods only"],
        answer: 2 },

      { q: "8. What is opportunity cost?",
        choices: ["The cost of labor","The next best alternative forgone","The amount spent on inputs","The total fixed cost"],
        answer: 1 },

      { q: "9. What happens when supply is greater than demand?",
        choices: ["Shortage","Surplus","Equilibrium","Inflation"],
        answer: 1 },

      { q: "10. What is gross income?",
        choices: ["Total sales or revenue before expenses","Net income after all costs","Profit after taxes","Fixed income"],
        answer: 0 }
    ];

    let current = 0;
    let score = 0;
    let answered = false;

    function loadQuestion() {
      document.getElementById("question").textContent = quiz[current].q;
      let html = "";
      quiz[current].choices.forEach((c, i) => {
        html += `<li onclick="checkAnswer(${i}, this)">${c}</li>`;
      });
      document.getElementById("choices").innerHTML = html;
      answered = false;
    }

    function checkAnswer(i, el) {
      if (answered) return;
      const correct = quiz[current].answer;
      const items = document.querySelectorAll("#choices li");

      if (i === correct) {
        el.classList.add("correct");
        score++;
      } else {
        el.classList.add("wrong");
        items[correct].classList.add("correct");
      }

      document.getElementById("score").textContent = "Score: " + score;
      answered = true;
      items.forEach(li => li.onclick = null);
    }

    function nextQuestion() {
      if (!answered) return alert("Answer first!");
      current++;

      if (current >= quiz.length) {
        document.querySelector(".question-box").style.display = "none";
        document.getElementById("nextBtn").style.display = "none";
        document.getElementById("restartBtn").style.display = "inline-block";
        document.getElementById("final").textContent =
          "🎉 Final Score: " + score + "/" + quiz.length;
        return;
      }

      loadQuestion();
    }

    function restartQuiz() {
      current = 0;
      score = 0;
      document.getElementById("score").textContent = "Score: 0";
      document.getElementById("final").textContent = "";
      document.querySelector(".question-box").style.display = "block";
      document.getElementById("nextBtn").style.display = "inline-block";
      document.getElementById("restartBtn").style.display = "none";
      loadQuestion();
    }

    loadQuestion();
  </script>

</body>
</html>
