<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crop Protection Practice</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f4f8f3;
      padding: 20px;
      margin: 0;
      color: #222;
    }

    .page {
      max-width: 800px;
      margin: auto;
    }

    h1 {
      margin-bottom: 10px;
      color: #2e7d32;
    }

    #score {
      font-size: 22px;
      margin: 20px 0;
      font-weight: bold;
    }

    .question-box {
      background: white;
      padding: 20px;
      margin: 20px auto;
      max-width: 700px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      text-align: left;
    }

    #question {
      margin-bottom: 12px;
    }

    ul {
      padding-left: 0;
    }

    li {
      list-style: none;
      padding: 12px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 8px;
      cursor: pointer;
      background: #ececec;
    }

    li:hover {
      background: #eee;
    }

    .correct {
      background: #a5d6a7 !important;
      font-weight: bold;
    }

    .wrong {
      background: #ffcdd2 !important;
      font-weight: bold;
    }

    button {
      padding: 12px 24px;
      margin-top: 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }

    #nextBtn {
      background: #2e7d32;
      color: white;
    }

    #nextBtn:hover {
      background: #1b5e20;
    }

    #restartBtn {
      background: #1565c0;
      color: white;
      display: none;
    }

    #final {
      font-size: 22px;
      margin-top: 20px;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div class="page">

    <h1>🛡 Crop Protection Practice</h1>

    <p id="score">Score: 0</p>

    <div class="question-box">
      <h3 id="question"></h3>
      <ul id="choices"></ul>
    </div>

    <button id="nextBtn" onclick="nextQuestion()">Next ➡</button>
    <button id="restartBtn" onclick="restartQuiz()">Restart 🔁</button>

    <div style="text-align:center; margin-top:20px;">
      <a href="practice.html"
         style="display:inline-block;
                padding:10px 18px;
                background:#2e7d32;
                color:#ffffff;
                border-radius:8px;
                text-decoration:none;
                font-weight:bold;">
         ⬅ Back to Subjects
      </a>
    </div>

    <h2 id="final"></h2>

  </div>

  <script>
    const quiz = [
      {
        q: "1. What is pest?",
        choices: [
          "Any organism beneficial to crops",
          "Any organism that causes damage to crops",
          "Only insects",
          "Only weeds"
        ],
        answer: 1
      }
    ];

    let current = 0;
    let score = 0;
    let answered = false;

    function loadQuestion() {
      document.getElementById("question").textContent = quiz[current].q;

      let html = "";
      quiz[current].choices.forEach((c, i) => {
        html += `<li onclick="check(${i}, this)">${c}</li>`;
      });

      document.getElementById("choices").innerHTML = html;
      answered = false;
    }

    function check(i, el) {
      if (answered) return;

      const correct = quiz[current].answer;
      const all = document.querySelectorAll("#choices li");

      if (i === correct) {
        el.classList.add("correct");
        score++;
      } else {
        el.classList.add("wrong");
        all[correct].classList.add("correct");
      }

      document.getElementById("score").textContent = "Score: " + score;
      answered = true;

      all.forEach(li => li.onclick = null);
    }

    function nextQuestion() {
      if (!answered) {
        alert("Answer first!");
        return;
      }

      current++;

      if (current >= quiz.length) {
        document.querySelector(".question-box").style.display = "none";
        document.getElementById("nextBtn").style.display = "none";
        document.getElementById("restartBtn").style.display = "inline-block";
        document.getElementById("final").textContent =
          "🎉 Final Score: " + score + "/" + quiz.length;
        return;
      }

      loadQuestion();
    }

    function restartQuiz() {
      current = 0;
      score = 0;
      answered = false;

      document.getElementById("score").textContent = "Score: 0";
      document.getElementById("final").textContent = "";
      document.querySelector(".question-box").style.display = "block";
      document.getElementById("nextBtn").style.display = "inline-block";
      document.getElementById("restartBtn").style.display = "none";

      loadQuestion();
    }

    loadQuestion();
  </script>

</body>
</html>
