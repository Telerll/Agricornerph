    #score {

      font-weight: bold;
    }

    .question-box {

      padding: 20px;

      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);

    }

    }

    ul {

    }

    li {
      list-style: none;

      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 8px;
      cursor: pointer;
      background: #ececec;
    }

    li:hover {

    }

    .correct {
      background: #a5d6a7 !important;
      font-weight: bold;
    }

    .wrong {

      font-weight: bold;
    }

    button {
      padding: 12px 24px;
      margin-top: 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }

    #nextBtn {
      background: #2e7d32;
      color: white;
    }

    #nextBtn:hover {
      background: #1b5e20;
    }

    #restartBtn {
      background: #1565c0;
      color: white;
      display: none;
    }

    #final {
      font-size: 22px;
      margin-top: 20px;
      font-weight: bold;

  </style>
</head>

<body>

    <button id="nextBtn" onclick="nextQuestion()">Next ➡</button>

    <div style="text-align:center; margin-top:20px;">

    <h2 id="final"></h2>

  </div>

    let current = 0;
    let score = 0;
    let answered = false;

    function loadQuestion() {
      document.getElementById("question").textContent = quiz[current].q;

      let html = "";
      quiz[current].choices.forEach((c, i) => {
        html += `<li onclick="check(${i}, this)">${c}</li>`;
      });

      document.getElementById("choices").innerHTML = html;
      answered = false;
    }

    function check(i, el) {
      if (answered) return;

      const correct = quiz[current].answer;
      const all = document.querySelectorAll("#choices li");

      if (i === correct) {
        el.classList.add("correct");
        score++;
      } else {
        el.classList.add("wrong");
        all[correct].classList.add("correct");
      }

      document.getElementById("score").textContent = "Score: " + score;
      answered = true;

      all.forEach(li => li.onclick = null);
    }

    function nextQuestion() {
      if (!answered) {
        alert("Answer first!");
        return;
      }

      current++;

      if (current >= quiz.length) {
        document.querySelector(".question-box").style.display = "none";
        document.getElementById("nextBtn").style.display = "none";
        document.getElementById("restartBtn").style.display = "inline-block";
        document.getElementById("final").textContent =
          "🎉 Final Score: " + score + "/" + quiz.length;
        return;
      }

      loadQuestion();
    }

    function restartQuiz() {
      current = 0;
      score = 0;
      answered = false;

      document.getElementById("score").textContent = "Score: 0";
      document.getElementById("final").textContent = "";
      document.querySelector(".question-box").style.display = "block";
      document.getElementById("nextBtn").style.display = "inline-block";
      document.getElementById("restartBtn").style.display = "none";

      loadQuestion();
    }

    loadQuestion();
  </script>

</body>
</html>
