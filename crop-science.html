<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Crop Science Practice</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
        }

        li {
            list-style: none;
            cursor: pointer;
            padding: 10px;
            margin: 5px;
        }

        li:hover {
            background: #eee;
              .question {
        display: none;
    }

    .question:first-of-type {
        display: block;
        }
    </style>
</head>
<body>

<h1>🌱 Crop Science Practice</h1>

<a href="practice.html">⬅ Back to Subjects</a>

<hr>

<p id="score">Score: 0</p>

<!-- QUESTION 1 -->
<div class="question">
    <p>1. Which part of the plant is responsible for photosynthesis?</p>
    <ul>
        <li onclick="checkAnswer(this, 1, 'A')">A. Root</li>
        <li onclick="checkAnswer(this, 1, 'B')">B. Stem</li>
        <li onclick="checkAnswer(this, 1, 'C')">C. Leaf</li>
    </ul>
    <p id="result1"></p>
</div>

<!-- QUESTION 2 -->
<div class="question">
    <p>2. Which nutrient is essential for plant growth?</p>
    <ul>
        <li onclick="checkAnswer(this, 2, 'A')">A. Nitrogen</li>
        <li onclick="checkAnswer(this, 2, 'B')">B. Oxygen</li>
        <li onclick="checkAnswer(this, 2, 'C')">C. Carbon</li>
    </ul>
    <p id="result2"></p>
</div>
<button onclick="nextQuestion()">Next Question ➡</button>
<script>
<script>
let score = 0;
let answered = {};
let currentQuestion = 1;

window.onload = function() {
    const questions = document.querySelectorAll('.question');
    questions.forEach((q, index) => {
        if (index !== 0) q.style.display = 'none';
    });
};

function checkAnswer(element, questionNumber, answer) {
    const correctAnswers = {
        1: 'C',
        2: 'A'
    };

    if (answered[questionNumber]) return;

    const result = document.getElementById('result' + questionNumber);
    const choices = element.parentElement.querySelectorAll('li');

    choices.forEach(li => li.style.color = 'black');

    if (answer === correctAnswers[questionNumber]) {
        element.style.color = 'green';
        result.textContent = 'Correct!';
        score++;
    } else {
        element.style.color = 'red';
        result.textContent = 'Wrong!';
    }

    answered[questionNumber] = true;
    document.getElementById('score').textContent = "Score: " + score;
}

function nextQuestion() {
    const questions = document.querySelectorAll('.question');

    questions[currentQuestion - 1].style.display = 'none';

    if (currentQuestion < questions.length) {
        questions[currentQuestion].style.display = 'block';
        currentQuestion++;
    }
}
</script>
