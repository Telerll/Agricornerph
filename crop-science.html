<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Crop Science Practice</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
        }

        li {
            list-style: none;
            cursor: pointer;
            padding: 10px;
            margin: 5px;
        }

        li:hover {
            background: #eee;
        }
    </style>
</head>
<body>

<h1>🌱 Crop Science Practice</h1>

<a href="practice.html">⬅ Back to Subjects</a>

<hr>

<div class="question">
    <p>1. Which part of the plant is responsible for photosynthesis?</p>
    <ul>
        <li onclick="checkAnswer(this, 'A')">A. Root</li>
        <li onclick="checkAnswer(this, 'B')">B. Stem</li>
        <li onclick="checkAnswer(this, 'C')">C. Leaf</li>
    </ul>
    <p id="result"></p>
</div>
<div class="question">
    <p>1. Which part of the plant is responsible for photosynthesis?</p>
    <ul>
        <li onclick="checkAnswer(this, 'A')">A. Root</li>
        <li onclick="checkAnswer(this, 'B')">B. Stem</li>
        <li onclick="checkAnswer(this, 'C')">C. Leaf</li>
    </ul>
    <p id="result"></p>
</div>
<script>
<script>
function checkAnswer(element, answer) {
    const correctAnswers = {
        1: 'C',
        2: 'A'
    };

    const question = element.parentElement.parentElement;
    const questionIndex = Array.from(document.querySelectorAll('.question')).indexOf(question) + 1;

    const result = question.querySelector('p[id^="result"]');
    const choices = question.querySelectorAll('li');

    choices.forEach(li => li.style.color = 'black');

    if (answer === correctAnswers[questionIndex]) {
        element.style.color = 'green';
        result.textContent = 'Correct!';
    } else {
        element.style.color = 'red';
        result.textContent = 'Wrong!';
    }
}
</script>

</body>
</html>
