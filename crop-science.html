<script>

let quiz = [
{
q: "Which seed class is original pure seed?",
options: ["Certified", "Registered", "Breeder", "Foundation"],
answer: 2
},
{
q: "Which system uses A, B, R lines?",
options: ["1-line", "2-line", "3-line", "Topcross"],
answer: 2
},
{
q: "Which farming avoids chemicals?",
options: ["Precision", "Organic", "Biodynamic", "Kyusei"],
answer: 1
},
{
q: "Which is no tillage farming?",
options: ["Organic", "Natural", "Kyusei", "Permaculture"],
answer: 1
},
{
q: "Cross between hybrid and parent?",
options: ["Backcross", "Topcross", "Polycross", "Testcross"],
answer: 0
}
];

let current = 0;
let score = 0;
let answered = false;

function loadQuestion() {
  answered = false;
  document.getElementById("result").innerHTML = "";

  let q = quiz[current];
  document.getElementById("question").innerHTML = q.q;

  let optionsHTML = "";
  q.options.forEach((opt, i) => {
    optionsHTML += `<li onclick="checkAnswer(${i}, this)">${opt}</li>`;
  });

  document.getElementById("options").innerHTML = optionsHTML;
}

function checkAnswer(index, element) {
  if(answered) return;
  answered = true;

  let correct = quiz[current].answer;
  let options = document.querySelectorAll("#options li");

  options[correct].classList.add("correct");

  if(index === correct){
    element.classList.add("correct");
    document.getElementById("result").innerHTML = "✅ Correct";
    score++;
  } else {
    element.classList.add("wrong");
    document.getElementById("result").innerHTML = "❌ Wrong";
  }

  document.getElementById("score").innerText = score;
}

function nextQuestion(){
  if(!answered){
    alert("Sagutan mo muna!");
    return;
  }

  current++;

  if(current >= quiz.length){
    alert("Quiz Finished! Score: " + score);
    restartQuiz();
    return;
  }

  loadQuestion();
}

function restartQuiz(){
  current = 0;
  score = 0;
  answered = false;

  document.getElementById("score").innerText = score;
  loadQuestion();
}

loadQuestion();

</script>
