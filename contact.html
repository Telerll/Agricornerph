<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - AgricornerPh</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f8f3;
      color: #222;
    }

    /* NAVBAR */
    nav {
      background-color: #1b5e20;
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
    }

    .nav-logo {
      font-size: 22px;
      font-weight: bold;
    }

    .nav-links {
      list-style: none;
      display: flex;
      gap: 15px;
      margin: 0;
      padding: 0;
    }

    .nav-links a {
      color: white;
      text-decoration: none;
      font-weight: bold;
    }

    /* PAGE */
    .page {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px;
      text-align: center;
    }

    h1 {
      font-size: 36px;
      color: #2e7d32;
      margin-bottom: 5px;
    }

    h2 {
      color: #2e7d32;
      margin-top: 0;
    }

    .page p {
      color: #555;
      margin-bottom: 25px;
    }

    /* CONTACT BOX */
    .contact-card {
      background: white;
      padding: 25px;
      border-radius: 16px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.12);
      text-align: left;
      max-width: 700px;
      margin: 0 auto;
    }

    .form-grid {
      display: grid;
      gap: 15px;
    }

    input, textarea {
      padding: 14px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 16px;
      width: 100%;
      box-sizing: border-box;
    }

    textarea {
      resize: vertical;
    }

    button {
      background: #2e7d32;
      color: white;
      border: none;
      padding: 14px;
      font-size: 16px;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 15px;
      width: 100%;
    }

    button:hover {
      background: #1b5e20;
    }

    /* FOOTER */
    footer {
      background: #1b5e20;
      color: white;
      text-align: center;
      padding: 20px;
      margin-top: 40px;
    }

    /* MOBILE FIX */
    @media (max-width: 768px) {
      nav {
        flex-direction: column;
        text-align: center;
      }

      .nav-links {
        flex-wrap: wrap;
        justify-content: center;
      }
    }
  </style>
</head>

<body>

  <!-- NAV -->
  <nav>
    <div class="nav-logo">AgricornerPh</div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="review.html">Review</a></li>
      <li><a href="practice.html">Practice</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

  <!-- PAGE -->
  <div class="page">
    <h1>Contact Us</h1>
    <h2>Do you have a question?</h2>
    <p>Please type your message below and we are happy to assist you!</p>

    <div class="contact-card">
      <form action="https://formsubmit.co/lemoncito.roldan@yahoo.com" method="POST">

        <input type="hidden" name="_captcha" value="false">
        <input type="hidden" name="_next" value="thankyou.html">

        <div class="form-grid">
          <input type="text" name="name" placeholder="Your Name here" required>
          <input type="email" name="email" placeholder="Your Email" required>
          <input type="text" name="subject" placeholder="Subject">
          <textarea name="message" rows="5" placeholder="Your message here ..." required></textarea>
        </div>

        <button type="submit">SEND</button>
      </form>
    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    <p>© 2026 AgricornerPh | All Rights Reserved</p>
  </footer>

</body>
</html>
