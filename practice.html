<!DOCTYPE html>
<html>
<head>
    <title>Practice Questions</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Practice Questions</h1>

    <p><b>1. What is the primary function of roots?</b></p>

  <ul>
    <li onclick="checkAnswer(this, 'A')">A. Photosynthesis</li>
    <li onclick="checkAnswer(this, 'B')">B. Absorption of water</li>
    <li onclick="checkAnswer(this, 'C')">C. Pollination</li>
    <li onclick="checkAnswer(this, 'D')">D. Respiration</li>
</ul>>

<p id="result"></p>
    </ul>

</body>
</html>
<script>
function checkAnswer(element, answer) {
    let correct = 'B';

    if (answer === correct) {
        element.style.color = 'green';
        document.getElementById("result").innerText = "Correct!";
    } else {
        element.style.color = 'red';
        document.getElementById("result").innerText = "Wrong!";
    }
}
</script>
