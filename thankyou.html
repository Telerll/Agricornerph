<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You - AgricornerPh</title>
  <link rel="stylesheet" href="style.css?v=2">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #388e3c, #66bb6a);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: white;
      text-align: center;
    }

    .box {
      background: white;
      color: #2e7d32;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.2);
      max-width: 400px;
    }

    .box h1 {
      margin-bottom: 10px;
    }

    .box p {
      margin-bottom: 20px;
      color: #555;
    }

    .btn {
      display: inline-block;
      padding: 12px 20px;
      background: #2e7d32;
      color: white;
      text-decoration: none;
      border-radius: 10px;
    }

    .btn:hover {
      background: #1b5e20;
    }
  </style>
</head>
<body>

  <div class="box">
    <h1>Thank You! 💚</h1>
    <p>Your message has been successfully sent.</p>
    <a href="index.html" class="btn">Back to Home</a>
  </div>

</body>
</html>
