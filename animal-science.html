<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animal Science Practice</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 20px;
      background: #f4f8f3;
    }

    h1 {
      margin-bottom: 10px;
    }

    a {
      display: inline-block;
      margin-bottom: 20px;
      color: #4a148c;
      font-weight: bold;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    #score {
      font-size: 22px;
      font-weight: bold;
      margin: 20px 0;
    }

    .question-box {
      background: white;
      padding: 20px;
      margin: 20px auto;
      max-width: 700px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    li {
      list-style: none;
      padding: 12px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 8px;
      cursor: pointer;
    }

    li:hover {
      background: #eee;
    }

    .correct {
      color: green;
      font-weight: bold;
    }

    .wrong {
      color: red;
      font-weight: bold;
    }

    #nextBtn, #restartBtn {
      padding: 12px 24px;
      margin-top: 20px;
      cursor: pointer;
      font-size: 16px;
      border: none;
      border-radius: 8px;
    }

    #nextBtn {
      background: #2e7d32;
      color: white;
    }

    #restartBtn {
      display: none;
      background: #1565c0;
      color: white;
    }

    #final {
      font-size: 22px;
      font-weight: bold;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <h1>🐄 Animal Science Practice</h1>
  <a href="practice.html">⬅ Back to Subjects</a>

  <hr>

  <p id="score">Score: 0</p>

  <div class="question-box">
    <h3 id="question"></h3>
    <ul id="choices"></ul>
  </div>

  <button id="nextBtn" onclick="nextQuestion()">Next ➡</button>
  <button id="restartBtn" onclick="restartQuiz()">Restart 🔁</button>

  <h2 id="final"></h2>

  <script>
    const quiz = [
      {
        q: "1. In 2021, what is the average milk intake per capita in the Philippines?",
        choices: ["22 kg", "16 kg", "27 kg", "287 kg"],
        answer: 1
      },
      {
        q: "2. Highly Pathogenic Avian Influenza (HPAI) is also known as?",
        choices: [
          "avian paramyxovirus Type 1 (APVM-1) virus",
          "Infectious Bronchitis Virus",
          "fowlpox virus",
          "H5N1"
        ],
        answer: 3
      },
      {
        q: "3. Which region in the Philippines had the most broilers in 2022?",
        choices: ["CALABARZON", "Western Visayas", "Central Luzon", "Southern Mindanao"],
        answer: 2
      },
      {
        q: "4. What province produces the most beef?",
        choices: ["Bukidnon", "Masbate", "Cebu", "Batangas"],
        answer: 0
      },
      {
        q: "5. Who is the Father of Poultry Science in the Philippines?",
        choices: [
          "Dr. Dioscoro Umali",
          "Dr. Ramon Barba",
          "Dr. Francisco Fronda",
          "Dr. Valentino Arganosa"
        ],
        answer: 2
      },
      {
        q: "6. Which of the following is a species of duck that is endemic to the Philippines?",
        choices: [
          "Anas crecca",
          "Anas platyrhynchos",
          "Dendrocygna arcuata",
          "Anas luzonica"
        ],
        answer: 3
      },
      {
        q: "7. What is one of the Agricultural Training Institute's (ATI) training centers specializing in comprehensive and practice-oriented swine production?",
        choices: ["ITCPH", "DTRI", "NSPRDC", "TESDA"],
        answer: 0
      },
      {
        q: "8. If a farmer fails to provide adequate food for their pigs or cows, causing them to suffer from malnutrition and starvation, which Philippine law may punish this type of animal cruelty?",
        choices: ["RA 1556", "RA 8485", "RA 9296", "RA 7884"],
        answer: 1
      },
      {
        q: "9. Livestock production for human consumption accounts for around 15% of total global greenhouse gas emissions; which animal is responsible for the majority of these emissions?",
        choices: [
          "Ovis aries",
          "Gallus gallus domesticus",
          "Bos taurus",
          "Sus scrofa domesticus"
        ],
        answer: 2
      },
      {
        q: "10. What is antimicrobial resistance (AMR)?",
        choices: [
          "The ability of animals to tolerate higher doses of antibiotics without adverse effects.",
          "The ability of animals to develop immunity against bacterial infections.",
          "The ability of bacteria to survive and multiply despite the presence of antibiotics.",
          "The ability of animals to resist viral infections."
        ],
        answer: 2
      },
      {
  q: "11. What structure is built at the center of ranch operation to minimize the movement of stocks/animals?",
  choices: ["Fence", "Race", "Corral", "Feedlot"],
  answer: 2
},
{
  q: "12. Which of the following is correct?",
  choices: [
    "Mallards are smaller than Muscovy Ducks and do not have a warty face or a sloping bill",
    "Mallard is Anas platyrhynchos and Muscovy Duck is Cairina moschata",
    "Mallard is Itik and Muscovy is bibe",
    "All of the above"
  ],
  answer: 3
},
{
  q: "13. Annual egg production of native chicken is:",
  choices: ["50-60 eggs", "100-150 eggs", "200-240 eggs", "260-280 eggs"],
  answer: 1
},
{
  q: "14. What is the main difference between goats and sheep in terms of their feeding behavior?",
  choices: [
    "Goats are grazers, while sheep are browsers.",
    "Goats are browsers, while sheep are grazers.",
    "Goats and sheep both graze and browse.",
    "Goats and sheep do not differ in their feeding behavior."
  ],
  answer: 1
},
{
  q: "15. Which of the following is an analogy of the body system and its basic or structural unit?",
  choices: [
    "Lungs : Alveoli",
    "Brain : Neurons",
    "Heart : Liver",
    "Stomach : Small intestine"
  ],
  answer: 3
},
{
  q: "16. Based on the average annual per capita consumption of selected agricultural products in 2018, the most consumed animal product is:",
  choices: ["pork", "chicken meat", "beef", "Chevon"],
  answer: 1
},
{
  q: "17. The animal’s most important contribution to human welfare is:",
  choices: ["Companionship", "Clothing", "Traction", "Food"],
  answer: 3
},
{
  q: "18. Highly Pathogenic Avian Influenza (HPAI) is also known as?",
  choices: [
    "avian paramyxovirus Type 1 (APVM-1) virus",
    "Infectious Bronchitis Virus",
    "fowlpox virus",
    "H5N1"
  ],
  answer: 3
},
{
  q: "19. Who is the leading broiler producer in the Philippines?",
  choices: ["CALABARZON", "Western Visayas", "Central Luzon", "Southern Mindanao"],
  answer: 2
},
{
  q: "20. What province produces the most beef?",
  choices: ["Bukidnon", "Masbate", "Cebu", "Batangas"],
  answer: 0
},
    ];

    let current = 0;
    let score = 0;
    let answered = false;

    function loadQuestion() {
      document.getElementById("question").textContent = quiz[current].q;

      let choicesHTML = "";
      quiz[current].choices.forEach((choice, i) => {
        choicesHTML += `<li onclick="checkAnswer(${i}, this)">${choice}</li>`;
      });

      document.getElementById("choices").innerHTML = choicesHTML;
      answered = false;
    }

    function checkAnswer(i, element) {
      if (answered) return;

      const correct = quiz[current].answer;
      const allChoices = document.querySelectorAll("#choices li");

      if (i === correct) {
        element.classList.add("correct");
        score++;
      } else {
        element.classList.add("wrong");
        allChoices[correct].classList.add("correct");
      }

      document.getElementById("score").textContent = "Score: " + score;
      answered = true;

      allChoices.forEach(li => li.onclick = null);
    }

    function nextQuestion() {
      if (!answered) {
        alert("Answer first!");
        return;
      }

      current++;

      if (current >= quiz.length) {
        document.querySelector(".question-box").style.display = "none";
        document.getElementById("nextBtn").style.display = "none";
        document.getElementById("restartBtn").style.display = "inline-block";
        document.getElementById("final").textContent =
          "🎉 Final Score: " + score + "/" + quiz.length;
        return;
      }

      loadQuestion();
    }

    function restartQuiz() {
      current = 0;
      score = 0;
      answered = false;

      document.getElementById("score").textContent = "Score: 0";
      document.getElementById("final").textContent = "";
      document.querySelector(".question-box").style.display = "block";
      document.getElementById("nextBtn").style.display = "inline-block";
      document.getElementById("restartBtn").style.display = "none";

      loadQuestion();
    }

    loadQuestion();
  </script>

</body>
</html>
