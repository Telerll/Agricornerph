<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animal Science Practice</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 20px;
      background: #f1f5f1;
    }

    h1 {
      margin-bottom: 10px;
    }

    a {
      display: inline-block;
      margin-bottom: 20px;
      color: #4a148c;
      font-weight: bold;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    #score {
      font-size: 22px;
      font-weight: bold;
      margin: 20px 0;
    }

    .question {
      border: 1px solid #ddd;
      padding: 20px;
      margin: 20px auto;
      border-radius: 10px;
      max-width: 700px;
      background: white;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }

    li {
      list-style: none;
      cursor: pointer;
      padding: 12px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    li:hover {
      background: #eee;
    }

    #q2, #q3 {
      display: none;
    }

    #nextBtn,
    #restartBtn {
      padding: 12px 24px;
      margin-top: 20px;
      cursor: pointer;
      font-size: 16px;
      border: none;
      border-radius: 8px;
    }

    #nextBtn {
      background: #2e7d32;
      color: white;
    }

    #restartBtn {
      display: none;
      background: #1565c0;
      color: white;
    }

    #finalResult {
      font-size: 22px;
      font-weight: bold;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <h1>🐄 Animal Science Practice</h1>
  <a href="practice.html">⬅ Back to Subjects</a>

  <hr>

  <p id="score">Score: 0</p>

<script>
const questions = [
  {
    q: "1. In 2021, what is the average milk intake per capita in the Philippines?",
    options: ["22 kg", "16 kg", "27 kg", "287 kg"],
    answer: "16 kg"
  },
  {
    q: "2. Highly Pathogenic Avian Influenza (HPAI) is also known as?",
    options: ["avian paramyxovirus Type 1 (APVM-1) virus", "Infectious Bronchitis Virus", "fowlpox virus", "H5N1"],
    answer: "H5N1"
  },
  {
    q: "3. Which region in the Philippines had the most broilers in 2022?",
    options: ["CALABARZON", "Western Visayas", "Central Luzon", "Southern Mindanao"],
    answer: "Central Luzon"
  },
  {
    q: "4. What province produces the most beef?",
    options: ["Bukidnon", "Masbate", "Cebu", "Batangas"],
    answer: "Bukidnon"
  },
  {
    q: "5. Who is the Father of Poultry Science in the Philippines?",
    options: ["Dr. Dioscoro Umali", "Dr. Ramon Barba", "Dr. Francisco Fronda", "Dr. Valentino Arganosa"],
    answer: "Dr. Francisco Fronda"
  },
  {
    q: "6. Which of the following is a species of duck that is endemic to the Philippines?",
    options: ["Anas crecca", "Anas platyrhynchos", "Dendrocygna arcuata", "Anas luzonica"],
    answer: "Anas luzonica"
  },
  {
    q: "7. What is one of the Agricultural Training Institute's (ATI) training centers specializing in comprehensive and practice-oriented swine production?",
    options: ["ITCPH", "DTRI", "NSPRDC", "TESDA"],
    answer: "NSPRDC"
  },
  {
    q: "8. If a farmer fails to provide adequate food for their pigs or cows, causing them to suffer from malnutrition and starvation, which Philippine law may punish this type of animal cruelty?",
    options: ["RA 1556", "RA 8485", "RA 9296", "RA 7884"],
    answer: "RA 8485"
  },
  {
    q: "9. Livestock production for human consumption accounts for around 15% of total global greenhouse gas emissions; which animal is responsible for the majority of these emissions?",
    options: ["Ovis aries", "Gallus gallus domesticus", "Bos taurus", "Sus scrofa domesticus"],
    answer: "Bos taurus"
  },
  {
    q: "10. What is antimicrobial resistance (AMR)?",
    options: [
      "The ability of animals to tolerate higher doses of antibiotics without adverse effects.",
      "The ability of animals to develop immunity against bacterial infections.",
      "The ability of bacteria to survive and multiply despite the presence of antibiotics.",
      "The ability of animals to resist viral infections."
    ],
    answer: "The ability of bacteria to survive and multiply despite the presence of antibiotics."
  }
];

let current = 0;

function showQuestion() {
  let q = questions[current];

  let html = `<div class="question">${q.q}</div>`;

  q.options.forEach(opt => {
    html += `<div class="option" onclick="checkAnswer(this, \`${q.answer}\`)">${opt}</div>`;
  });

  document.getElementById("quiz-box").innerHTML = html;
}

function checkAnswer(el, correct) {
  let options = document.querySelectorAll(".option");

  options.forEach(o => {
    o.style.pointerEvents = "none";
    if (o.innerText === correct) {
      o.classList.add("correct");
    }
  });

  if (el.innerText !== correct) {
    el.classList.add("wrong");
  }
}

function nextQuestion() {
  current++;
  if (current >= questions.length) {
    current = 0;
  }
  showQuestion();
}

showQuestion();
</script>
    <p id="result3"></p>
  </div>

  <button id="nextBtn" type="button" onclick="nextQuestion()">Next ➡</button>

  <p id="finalResult"></p>

  <button id="restartBtn" type="button" onclick="restartQuiz()">Restart 🔁</button>

  <script>
    let score = 0;
    let answered = {};
    let currentQuestion = 1;

    const correctAnswers = {
      1: 'A',
      2: 'C',
      3: 'B'
    };

    function checkAnswer(element, questionNumber, answer) {
      if (answered[questionNumber]) return;

      const result = document.getElementById('result' + questionNumber);
      const choices = element.parentElement.querySelectorAll('li');

      choices.forEach(function(li) {
        li.style.color = 'black';
      });

      if (answer === correctAnswers[questionNumber]) {
        element.style.color = 'green';
        result.textContent = 'Correct!';
        score++;
      } else {
        element.style.color = 'red';
        result.textContent = 'Wrong!';
      }

      answered[questionNumber] = true;
      document.getElementById('score').textContent = 'Score: ' + score;
    }

    function nextQuestion() {
      if (!answered[currentQuestion]) {
        alert('Answer first!');
        return;
      }

      if (currentQuestion === 1) {
        document.getElementById('q1').style.display = 'none';
        document.getElementById('q2').style.display = 'block';
        currentQuestion = 2;
      } else if (currentQuestion === 2) {
        document.getElementById('q2').style.display = 'none';
        document.getElementById('q3').style.display = 'block';
        currentQuestion = 3;
        document.getElementById('nextBtn').textContent = 'Finish';
      } else {
        document.getElementById('finalResult').textContent =
          '🎉 Quiz Finished! Your Score: ' + score;
        document.getElementById('nextBtn').style.display = 'none';
        document.getElementById('restartBtn').style.display = 'inline-block';
      }
    }

    function restartQuiz() {
      score = 0;
      answered = {};
      currentQuestion = 1;

      document.getElementById('score').textContent = 'Score: 0';
      document.getElementById('finalResult').textContent = '';

      document.getElementById('q1').style.display = 'block';
      document.getElementById('q2').style.display = 'none';
      document.getElementById('q3').style.display = 'none';

      document.getElementById('result1').textContent = '';
      document.getElementById('result2').textContent = '';
      document.getElementById('result3').textContent = '';

      document.querySelectorAll('li').forEach(function(li) {
        li.style.color = 'black';
      });

      document.getElementById('nextBtn').style.display = 'inline-block';
      document.getElementById('nextBtn').textContent = 'Next ➡';
      document.getElementById('restartBtn').style.display = 'none';
    }
  </script>

</body>
</html>
