<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animal Science Practice</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 20px;
      background: #f4f8f3;
      color: #222;
    }

    .page {
      max-width: 800px;
      margin: auto;
    }

    h1 {
      margin-bottom: 10px;
      color: #2e7d32;
    }

    #score {
      font-size: 22px;
      font-weight: bold;
      margin: 20px 0;
    }

    .question-box {
      background: white;
      padding: 20px;
      margin: 20px auto;
      max-width: 700px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      text-align: left;
    }

    #question {
      margin-bottom: 12px;
    }

    ul {
      padding-left: 0;
    }

    li {
      list-style: none;
      padding: 12px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 8px;
      cursor: pointer;
      background: #ececec;
    }

    li:hover {
      background: #eee;
    }

    .correct {
      background: #a5d6a7 !important;
      font-weight: bold;
    }

    .wrong {
      background: #ffcdd2 !important;
      font-weight: bold;
    }

    #nextBtn, #restartBtn {
      padding: 12px 24px;
      margin-top: 20px;
      cursor: pointer;
      font-size: 16px;
      border: none;
      border-radius: 8px;
    }

    #nextBtn {
      background: #2e7d32;
      color: white;
    }

    #nextBtn:hover {
      background: #1b5e20;
    }

    #restartBtn {
      display: none;
      background: #1565c0;
      color: white;
    }

    #final {
      font-size: 22px;
      font-weight: bold;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <div class="page">

    <h1>🐄 Animal Science Practice</h1>

    <p id="score">Score: 0</p>

    <div class="question-box">
      <h3 id="question"></h3>
      <ul id="choices"></ul>
    </div>

    <button id="nextBtn" onclick="nextQuestion()">Next ➡</button>
    <button id="restartBtn" onclick="restartQuiz()">Restart 🔁</button>

    <div style="text-align:center; margin-top:20px;">
      <a href="practice.html"

                padding:10px 18px;

                color:#ffffff;
                border-radius:8px;
                text-decoration:none;
                font-weight:bold;">

    </div>

    <h2 id="final"></h2>

  </div>

      {

      {
        q: "48. Which avian disease usually appears during hot months?",
        choices: ["Fowl cholera", "Tuberculosis", "Fowl typhoid", "Fowl pox"],
        answer: 2
      },
      {
        q: "49. What are the larval stage of heel flies called?",
        choices: ["Cattle grubs", "Cattle lice", "Mange mites", "Sarcoptic mange"],
        answer: 0
      },
      {
        q: "50. Which avian disease is caused by mycoplasma?",
        choices: ["Coccidiosis", "Marek’s disease", "Avian malaria", "Chronic respiratory disease"],
        answer: 3

    ];

    let current = 0;
    let score = 0;
    let answered = false;

    function loadQuestion() {
      document.getElementById("question").textContent = quiz[current].q;

      let choicesHTML = "";
      quiz[current].choices.forEach((choice, i) => {
        choicesHTML += `<li onclick="checkAnswer(${i}, this)">${choice}</li>`;
      });

      document.getElementById("choices").innerHTML = choicesHTML;
      answered = false;
    }

    function checkAnswer(i, element) {
      if (answered) return;

      const correct = quiz[current].answer;
      const allChoices = document.querySelectorAll("#choices li");

      if (i === correct) {
        element.classList.add("correct");
        score++;
      } else {
        element.classList.add("wrong");
        allChoices[correct].classList.add("correct");
      }

      document.getElementById("score").textContent = "Score: " + score;
      answered = true;

      allChoices.forEach(li => li.onclick = null);
    }

    function nextQuestion() {
      if (!answered) {
        alert("Answer first!");
        return;
      }

      current++;

      if (current >= quiz.length) {
        document.querySelector(".question-box").style.display = "none";
        document.getElementById("nextBtn").style.display = "none";
        document.getElementById("restartBtn").style.display = "inline-block";
        document.getElementById("final").textContent =
          "🎉 Final Score: " + score + "/" + quiz.length;
        return;
      }

      loadQuestion();
    }

    function restartQuiz() {
      current = 0;
      score = 0;
      answered = false;

      document.getElementById("score").textContent = "Score: 0";
      document.getElementById("final").textContent = "";
      document.querySelector(".question-box").style.display = "block";
      document.getElementById("nextBtn").style.display = "inline-block";
      document.getElementById("restartBtn").style.display = "none";

      loadQuestion();
    }

    loadQuestion();
  </script>

</body>
</html>
