<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soil Science Practice</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 20px;
      background: #f4f8f3;
    }

    h1 {
      margin-bottom: 10px;
    }

    a {
      display: inline-block;
      margin-bottom: 20px;
      color: #4a148c;
      font-weight: bold;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    #score {
      font-size: 22px;
      font-weight: bold;
      margin: 20px 0;
    }

    .question-box {
      background: white;
      padding: 20px;
      margin: 20px auto;
      max-width: 700px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    li {
      list-style: none;
      padding: 12px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 8px;
      cursor: pointer;
    }

    li:hover {
      background: #eee;
    }

    .correct {
      color: green;
    }

    .wrong {
      color: red;
    }

    #nextBtn, #restartBtn {
      padding: 12px 24px;
      margin-top: 20px;
      cursor: pointer;
      font-size: 16px;
      border: none;
      border-radius: 8px;
    }

    #nextBtn {
      background: #2e7d32;
      color: white;
    }

    #restartBtn {
      display: none;
      background: #1565c0;
      color: white;
    }

    #final {
      font-size: 22px;
      font-weight: bold;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <h1>🧪 Soil Science Practice</h1>
  <a href="practice.html">⬅ Back to Subjects</a>

  <hr>

  <p id="score">Score: 0</p>

  <div class="question-box">
    <h3 id="question"></h3>
    <ul id="choices"></ul>
  </div>

  <button id="nextBtn" onclick="nextQuestion()">Next ➡</button>
  <button id="restartBtn" onclick="restartQuiz()">Restart 🔁</button>

  <h2 id="final"></h2>

  <script>
    const quiz = [
      {
        q: "1. What does CLORPT stand for in soil formation?",
        choices: [
          "Climate, Land, Organism, Relief, Parent Material",
          "Climate, Organisms, Relief, Parent Material, Time",
          "Climate, Location, Rock, Plant, Temperature",
          "Climate, Landform, Organic matter, Rock, Time"
        ],
        answer: 1
      },
      {
        q: "2. Which soil-forming factor refers to topography?",
        choices: ["Climate", "Organisms", "Relief", "Time"],
        answer: 2
      },
      {
        q: "3. What is the study of soil formation called?",
        choices: ["Edaphology", "Pedology", "Geology", "Agronomy"],
        answer: 1
      },
      {
        q: "4. Which soil horizon is richest in organic matter?",
        choices: ["O horizon", "A horizon", "B horizon", "C horizon"],
        answer: 0
      },
      {
        q: "5. Which soil horizon is known as subsoil?",
        choices: ["O", "A", "B", "C"],
        answer: 2
      },
      {
        q: "6. Which soil property refers to particle size distribution?",
        choices: ["Structure", "Texture", "Color", "Consistency"],
        answer: 1
      },
      {
        q: "7. What soil texture has the highest water-holding capacity?",
        choices: ["Sand", "Silt", "Clay", "Loam"],
        answer: 2
      },
      {
        q: "8. Which soil pH is considered neutral?",
        choices: ["5", "6", "7", "8"],
        answer: 2
      },
      {
        q: "9. Which factor affects soil color?",
        choices: ["Organic matter", "Moisture", "Iron content", "All of the above"],
        answer: 3
      },
      {
        q: "10. Which soil type drains water the fastest?",
        choices: ["Clay", "Loam", "Sandy soil", "Silty soil"],
        answer: 2
      }
    ];

    let current = 0;
    let score = 0;
    let answered = false;

    function loadQuestion() {
      document.getElementById("question").textContent = quiz[current].q;

      let choicesHTML = "";
      quiz[current].choices.forEach((choice, i) => {
        choicesHTML += `<li onclick="checkAnswer(${i}, this)">${choice}</li>`;
      });

      document.getElementById("choices").innerHTML = choicesHTML;
      answered = false;
    }

    function checkAnswer(i, element) {
      if (answered) return;

      const correct = quiz[current].answer;
      const allChoices = document.querySelectorAll("#choices li");

      if (i === correct) {
        element.classList.add("correct");
        score++;
      } else {
        element.classList.add("wrong");
        allChoices[correct].classList.add("correct");
      }

      document.getElementById("score").textContent = "Score: " + score;
      answered = true;

      allChoices.forEach(li => li.onclick = null);
    }

    function nextQuestion() {
      if (!answered) {
        alert("Answer first!");
        return;
      }

      current++;

      if (current >= quiz.length) {
        document.querySelector(".question-box").style.display = "none";
        document.getElementById("nextBtn").style.display = "none";
        document.getElementById("restartBtn").style.display = "inline-block";
        document.getElementById("final").textContent =
          "🎉 Final Score: " + score + "/" + quiz.length;
        return;
      }

      loadQuestion();
    }

    function restartQuiz() {
      current = 0;
      score = 0;
      answered = false;

      document.getElementById("score").textContent = "Score: 0";
      document.getElementById("final").textContent = "";
      document.querySelector(".question-box").style.display = "block";
      document.getElementById("nextBtn").style.display = "inline-block";
      document.getElementById("restartBtn").style.display = "none";

      loadQuestion();
    }

    loadQuestion();
  </script>

</body>
</html>
