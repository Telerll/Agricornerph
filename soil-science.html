<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animal Science Practice</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 20px;
      background: #f1f5f1;
    }

    h1 {
      margin-bottom: 10px;
    }

    a {
      display: inline-block;
      margin-bottom: 20px;
      color: #4a148c;
      font-weight: bold;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    #score {
      font-size: 22px;
      font-weight: bold;
      margin: 20px 0;
    }

    .question {
      border: 1px solid #ddd;
      padding: 20px;
      margin: 20px auto;
      border-radius: 10px;
      max-width: 700px;
      background: white;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }

    li {
      list-style: none;
      cursor: pointer;
      padding: 12px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    li:hover {
      background: #eee;
    }

    #q2, #q3 {
      display: none;
    }

    #nextBtn,
    #restartBtn {
      padding: 12px 24px;
      margin-top: 20px;
      cursor: pointer;
      font-size: 16px;
      border: none;
      border-radius: 8px;
    }

    #nextBtn {
      background: #2e7d32;
      color: white;
    }

    #restartBtn {
      display: none;
      background: #1565c0;
      color: white;
    }

    #finalResult {
      font-size: 22px;
      font-weight: bold;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <h1>🐄 Soil Science Practice</h1>
  <a href="practice.html">⬅ Back to Subjects</a>

  <hr>

  <p id="score">Score: 0</p>

  <div class="question" id="q1">
   <script>
const quiz = [
{
q: "1. What does CLORPT stand for in soil formation?",
choices: [
"Climate, Land, Organism, Relief, Parent Material",
"Climate, Organisms, Relief, Parent Material, Time",
"Climate, Location, Rock, Plant, Temperature",
"Climate, Landform, Organic matter, Rock, Time"
],
answer: 1
},
{
q: "2. Which soil-forming factor refers to topography?",
choices: ["Climate","Organisms","Relief","Time"],
answer: 2
},
{
q: "3. What is the study of soil formation called?",
choices: ["Edaphology","Pedology","Geology","Agronomy"],
answer: 1
},
{
q: "4. Which soil horizon is richest in organic matter?",
choices: ["O horizon","A horizon","B horizon","C horizon"],
answer: 0
},
{
q: "5. Which soil horizon is known as subsoil?",
choices: ["O","A","B","C"],
answer: 2
},
{
q: "6. Which soil property refers to particle size distribution?",
choices: ["Structure","Texture","Color","Consistency"],
answer: 1
},
{
q: "7. What soil texture has the highest water-holding capacity?",
choices: ["Sand","Silt","Clay","Loam"],
answer: 2
},
{
q: "8. Which soil pH is considered neutral?",
choices: ["5","6","7","8"],
answer: 2
},
{
q: "9. Which factor affects soil color?",
choices: ["Organic matter","Moisture","Iron content","All of the above"],
answer: 3
},
{
q: "10. Which soil type drains water the fastest?",
choices: ["Clay","Loam","Sandy soil","Silty soil"],
answer: 2
}
];

let current = 0;
let score = 0;

function loadQuestion(){
  document.getElementById("question").textContent = quiz[current].q;

  let choicesHTML = "";
  quiz[current].choices.forEach((c,i)=>{
    choicesHTML += `<li onclick="check(${i}, this)">${c}</li>`;
  });

  document.getElementById("choices").innerHTML = choicesHTML;
}

function check(i, element){
  const correct = quiz[current].answer;

  if(i === correct){
    element.classList.add("correct");
    score++;
  } else {
    element.classList.add("wrong");
  }

  document.getElementById("score").textContent = "Score: " + score;

  document.querySelectorAll("li").forEach(li => li.onclick = null);
}

function nextQuestion(){
  current++;

  if(current >= quiz.length){
    document.getElementById("final").textContent =
      "🎉 Final Score: " + score + "/" + quiz.length;
    document.querySelector(".question-box").style.display = "none";
    return;
  }

  loadQuestion();
}

loadQuestion();
</script>
    </ul>
    <p id="result3"></p>
  </div>

  <button id="nextBtn" type="button" onclick="nextQuestion()">Next ➡</button>

  <p id="finalResult"></p>

  <button id="restartBtn" type="button" onclick="restartQuiz()">Restart 🔁</button>

  <script>
    let score = 0;
    let answered = {};
    let currentQuestion = 1;

    const correctAnswers = {
      1: 'A',
      2: 'C',
      3: 'B'
    };

    function checkAnswer(element, questionNumber, answer) {
      if (answered[questionNumber]) return;

      const result = document.getElementById('result' + questionNumber);
      const choices = element.parentElement.querySelectorAll('li');

      choices.forEach(function(li) {
        li.style.color = 'black';
      });

      if (answer === correctAnswers[questionNumber]) {
        element.style.color = 'green';
        result.textContent = 'Correct!';
        score++;
      } else {
        element.style.color = 'red';
        result.textContent = 'Wrong!';
      }

      answered[questionNumber] = true;
      document.getElementById('score').textContent = 'Score: ' + score;
    }

    function nextQuestion() {
      if (!answered[currentQuestion]) {
        alert('Answer first!');
        return;
      }

      if (currentQuestion === 1) {
        document.getElementById('q1').style.display = 'none';
        document.getElementById('q2').style.display = 'block';
        currentQuestion = 2;
      } else if (currentQuestion === 2) {
        document.getElementById('q2').style.display = 'none';
        document.getElementById('q3').style.display = 'block';
        currentQuestion = 3;
        document.getElementById('nextBtn').textContent = 'Finish';
      } else {
        document.getElementById('finalResult').textContent =
          '🎉 Quiz Finished! Your Score: ' + score;
        document.getElementById('nextBtn').style.display = 'none';
        document.getElementById('restartBtn').style.display = 'inline-block';
      }
    }

    function restartQuiz() {
      score = 0;
      answered = {};
      currentQuestion = 1;

      document.getElementById('score').textContent = 'Score: 0';
      document.getElementById('finalResult').textContent = '';

      document.getElementById('q1').style.display = 'block';
      document.getElementById('q2').style.display = 'none';
      document.getElementById('q3').style.display = 'none';

      document.getElementById('result1').textContent = '';
      document.getElementById('result2').textContent = '';
      document.getElementById('result3').textContent = '';

      document.querySelectorAll('li').forEach(function(li) {
        li.style.color = 'black';
      });

      document.getElementById('nextBtn').style.display = 'inline-block';
      document.getElementById('nextBtn').textContent = 'Next ➡';
      document.getElementById('restartBtn').style.display = 'none';
    }
  </script>

</body>
</html>
